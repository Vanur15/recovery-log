<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Recovery Log</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css"/>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f0;color:#1a1a18;min-height:100vh;}
  .app{max-width:700px;margin:0 auto;padding:1.5rem 1rem 4rem;}
  h1{font-size:22px;font-weight:600;margin-bottom:4px;}
  .subtitle{font-size:14px;color:#666;margin-bottom:1.5rem;}
  .tabs{display:flex;gap:6px;margin-bottom:1.5rem;flex-wrap:wrap;}
  .tab{padding:7px 14px;border-radius:8px;border:1px solid #ddd;background:transparent;cursor:pointer;font-size:13px;color:#666;}
  .tab.active{background:#e8f0fe;color:#1a56db;border-color:#93b4f8;font-weight:600;}
  .card{background:#fff;border:1px solid #e5e5e0;border-radius:12px;padding:1.25rem;margin-bottom:1rem;}
  .section-title{font-size:17px;font-weight:600;margin-bottom:14px;display:flex;align-items:center;gap:8px;}
  label{font-size:13px;color:#555;margin-bottom:5px;display:block;}
  input,select{width:100%;padding:8px 10px;border:1px solid #ddd;border-radius:8px;font-size:14px;background:#fff;color:#1a1a18;font-family:inherit;}
  input:focus,select:focus{outline:none;border-color:#93b4f8;box-shadow:0 0 0 2px rgba(147,180,248,0.3);}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
  .mb{margin-bottom:12px;}
  .flex-end{display:flex;justify-content:flex-end;gap:8px;margin-top:14px;}
  .btn{padding:9px 18px;border-radius:8px;border:none;font-size:14px;font-weight:600;cursor:pointer;}
  .btn-primary{background:#1a56db;color:#fff;}
  .btn-sm{background:transparent;color:#888;border:1px solid #ddd;border-radius:6px;padding:4px 10px;font-size:12px;cursor:pointer;}
  .btn-danger{background:transparent;color:#dc2626;border:1px solid #fca5a5;border-radius:6px;padding:4px 10px;font-size:12px;cursor:pointer;}
  .btn-save{background:#1a56db;color:#fff;border:none;border-radius:6px;padding:4px 12px;font-size:12px;font-weight:600;cursor:pointer;}
  .btn-export{background:#fff;color:#333;border:1px solid #ddd;border-radius:8px;padding:8px 16px;font-size:13px;cursor:pointer;font-weight:500;}
  .btn-clear{background:transparent;color:#dc2626;border:1px solid #fca5a5;border-radius:8px;padding:8px 16px;font-size:13px;cursor:pointer;}
  .entry{border:1px solid #e5e5e0;border-radius:8px;padding:10px 14px;margin-bottom:8px;background:#fafaf8;}
  .entry.editing{border-color:#93b4f8;background:#f0f5ff;}
  .entry-header{display:flex;justify-content:space-between;align-items:flex-start;}
  .entry-info{flex:1;min-width:0;}
  .badge{display:inline-block;font-size:11px;padding:2px 8px;border-radius:20px;font-weight:600;margin-bottom:3px;}
  .badge-med{background:#e8f0fe;color:#1a56db;}
  .badge-urine{background:#d1fae5;color:#065f46;}
  .badge-activity{background:#fef3c7;color:#92400e;}
  .entry-title{font-size:14px;font-weight:600;color:#1a1a18;margin:2px 0 2px;}
  .entry-detail{font-size:13px;color:#666;}
  .entry-actions{display:flex;gap:6px;flex-shrink:0;margin-left:8px;}
  .date-divider{font-size:11px;font-weight:700;color:#999;margin:14px 0 6px;text-transform:uppercase;letter-spacing:0.06em;border-top:1px solid #eee;padding-top:10px;}
  .empty{color:#999;font-size:14px;text-align:center;padding:28px 0;}
  .color-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:6px;}
  .color-btn{border:2.5px solid transparent;border-radius:8px;padding:10px 4px;font-size:12px;cursor:pointer;text-align:center;font-weight:600;transition:transform 0.1s,box-shadow 0.1s;}
  .color-btn.selected{border-color:#222;font-size:13px;font-weight:800;transform:scale(1.08);box-shadow:0 2px 8px rgba(0,0,0,0.18);}
  .color-label{font-size:13px;font-weight:600;margin-top:8px;min-height:18px;color:#333;}
  .slot-grid{display:flex;flex-wrap:wrap;gap:8px;margin-top:6px;}
  .slot-btn{border:2px solid #ccc;border-radius:20px;padding:7px 14px;font-size:13px;cursor:pointer;background:#f5f5f0;color:#555;font-weight:500;transition:transform 0.1s,box-shadow 0.1s;display:flex;align-items:center;gap:5px;}
  .slot-btn.selected{border:3px solid #222;background:#e8f0fe;color:#1a56db;font-weight:700;font-size:14px;transform:scale(1.06);box-shadow:0 2px 8px rgba(0,0,0,0.15);}
  .slot-label{font-size:13px;font-weight:600;margin-top:8px;min-height:18px;color:#333;}
  .freq-hint{font-size:12px;color:#1a56db;margin-top:5px;min-height:16px;font-weight:500;}
  .med-card{border:1px solid #e5e5e0;border-radius:8px;padding:12px 14px;margin-bottom:8px;background:#fafaf8;}
  .med-card.editing{border-color:#93b4f8;background:#f0f5ff;}
  .med-name{font-size:14px;font-weight:600;}
  .med-detail{font-size:12px;color:#666;margin-top:2px;}
  .reminder-card{border:1px solid #93b4f8;border-radius:12px;padding:1rem 1.25rem;margin-bottom:10px;background:#f0f5ff;}
  .reminder-name{font-size:15px;font-weight:600;}
  .reminder-meta{font-size:12px;color:#555;margin-top:2px;}
  .countdown{font-size:22px;font-weight:700;color:#1a56db;margin:8px 0 4px;font-variant-numeric:tabular-nums;}
  .countdown.overdue{color:#dc2626;}
  .countdown.done{color:#999;font-size:14px;}
  .progress-wrap{height:5px;background:#dde;border-radius:3px;margin-top:8px;overflow:hidden;}
  .progress-bar{height:5px;background:#1a56db;border-radius:3px;}
  .edit-form{margin-top:10px;border-top:1px solid #c7d9fd;padding-top:10px;}
  .edit-input{width:100%;box-sizing:border-box;font-size:13px;padding:6px 8px;border-radius:6px;border:1px solid #ccc;background:#fff;color:#1a1a18;font-family:inherit;}
  .edit-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;}
  .edit-label{font-size:11px;color:#666;margin-bottom:4px;display:block;}
  .add-toggle{font-size:13px;color:#1a56db;cursor:pointer;display:flex;align-items:center;gap:6px;font-weight:600;margin-bottom:12px;}
  .notif-bar{background:#fef3c7;border:1px solid #fcd34d;border-radius:8px;padding:10px 14px;margin-bottom:12px;font-size:13px;color:#92400e;display:none;}
  .save-indicator{position:fixed;bottom:20px;right:20px;background:#1a56db;color:#fff;padding:10px 18px;border-radius:8px;font-size:14px;font-weight:600;z-index:999;opacity:0;transition:opacity 0.4s;pointer-events:none;}
  .end-preview{font-size:12px;color:#666;margin-top:6px;min-height:16px;}
  .toolbar{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap;}
</style>
</head>
<body>
<div class="app">
  <h1>Recovery log</h1>
  <div class="subtitle" id="date-display"></div>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('log')" id="tab-log">Log entry</button>
    <button class="tab" onclick="switchTab('medications')" id="tab-medications">Medications (<span id="med-count">0</span>)</button>
    <button class="tab" onclick="switchTab('reminders')" id="tab-reminders">Reminders (<span id="rem-count">0</span>)</button>
    <button class="tab" onclick="switchTab('history')" id="tab-history">History (<span id="hist-count">0</span>)</button>
  </div>

  <div id="panel-log">
    <div class="card">
      <div class="section-title"><i class="ti ti-pill"></i> Medication</div>
      <div class="row2"><div><label>Date</label><input type="date" id="med-date"/></div><div><label>Time taken</label><input type="time" id="med-time"/></div></div>
      <div class="mb"><label>Select medication</label><select id="med-select" onchange="fillFromLib()"><option value="">— choose or enter manually below —</option></select></div>
      <div class="row2"><div><label>Medication name</label><input type="text" id="med-name" placeholder="e.g. Tylenol"/></div><div><label>Dose</label><input type="text" id="med-dose" placeholder="e.g. 500mg"/></div></div>
      <div class="row2"><div><label>Count</label><input type="text" id="med-count-in" placeholder="e.g. 2 pills"/></div><div><label>Notes</label><input type="text" id="med-notes" placeholder="e.g. with food"/></div></div>
      <div class="flex-end"><button class="btn btn-primary" onclick="logMed()"><i class="ti ti-plus"></i> Log medication</button></div>
    </div>
    <div class="card">
      <div class="section-title"><i class="ti ti-droplet"></i> Urine output</div>
      <div class="row2"><div><label>Date</label><input type="date" id="urine-date"/></div><div><label>Time</label><input type="time" id="urine-time"/></div></div>
      <div class="row2"><div><label>Amount (mL)</label><input type="number" id="urine-amount" placeholder="e.g. 250" min="0"/></div><div><label>Notes</label><input type="text" id="urine-notes" placeholder="e.g. odor, urgency"/></div></div>
      <div class="mb">
        <label>Color</label>
        <div class="color-grid">
          <button class="color-btn" style="background:#f0f8ff;color:#1a4a6b;" onclick="selColorFn(this,'Clear')">Clear</button>
          <button class="color-btn" style="background:#fff9c4;color:#7a6500;" onclick="selColorFn(this,'Pale yellow')">Pale yellow</button>
          <button class="color-btn" style="background:#fdd835;color:#5a4100;" onclick="selColorFn(this,'Yellow')">Yellow</button>
          <button class="color-btn" style="background:#f9a825;color:#4a2d00;" onclick="selColorFn(this,'Dark yellow')">Dark yellow</button>
          <button class="color-btn" style="background:#e65100;color:#fff;" onclick="selColorFn(this,'Orange')">Orange</button>
          <button class="color-btn" style="background:#b71c1c;color:#fff;" onclick="selColorFn(this,'Pink/red')">Pink/red</button>
        </div>
        <div class="color-label" id="color-label">No color selected</div>
      </div>
      <div class="flex-end"><button class="btn btn-primary" onclick="logUrine()"><i class="ti ti-plus"></i> Log urine output</button></div>
    </div>
    <div class="card">
      <div class="section-title"><i class="ti ti-activity"></i> Activity / other</div>
      <div class="row2"><div><label>Date</label><input type="date" id="act-date"/></div><div><label>Time</label><input type="time" id="act-time"/></div></div>
      <div class="row2"><div><label>Activity</label><input type="text" id="act-name" placeholder="e.g. Bath, Nasal Irrigation"/></div><div><label>Notes</label><input type="text" id="act-notes" placeholder="e.g. tolerated well"/></div></div>
      <div class="flex-end"><button class="btn btn-primary" onclick="logActivity()"><i class="ti ti-plus"></i> Log activity</button></div>
    </div>
  </div>

  <div id="panel-medications" style="display:none;">
    <div id="med-lib-list"></div>
    <div class="card" style="margin-top:8px;">
      <div class="add-toggle" onclick="toggleAddForm()"><i class="ti ti-plus" id="add-icon"></i><span id="add-label">Add new medication</span></div>
      <div id="add-form" style="display:none;">
        <div class="row2"><div><label>Medication name</label><input type="text" id="lib-name" placeholder="e.g. Tylenol"/></div><div><label>Dose</label><input type="text" id="lib-dose" placeholder="e.g. 500mg"/></div></div>
        <div class="row2"><div><label>Count</label><input type="text" id="lib-count" placeholder="e.g. 2 pills"/></div><div><label>Notes</label><input type="text" id="lib-notes" placeholder="e.g. with food"/></div></div>
        <div class="mb">
          <label>When to take <span style="font-weight:400;color:#999;">(select all that apply)</span></label>
          <div class="slot-grid" id="lib-slots">
            <button class="slot-btn" onclick="toggleSlot(this,'Morning')"><i class="ti ti-sun"></i>Morning</button>
            <button class="slot-btn" onclick="toggleSlot(this,'Around noon')"><i class="ti ti-clock"></i>Around noon</button>
            <button class="slot-btn" onclick="toggleSlot(this,'Evening')"><i class="ti ti-moon"></i>Evening</button>
            <button class="slot-btn" onclick="toggleSlot(this,'Bedtime')"><i class="ti ti-zzz"></i>Bedtime</button>
            <button class="slot-btn" onclick="toggleSlot(this,'As needed')"><i class="ti ti-alert-circle"></i>As needed</button>
          </div>
          <div class="slot-label" id="slot-label">No time selected</div>
          <div class="freq-hint" id="freq-hint"></div>
        </div>
        <div style="border-top:1px solid #eee;margin:12px 0;padding-top:12px;">
          <div style="font-size:13px;font-weight:600;color:#666;margin-bottom:10px;"><i class="ti ti-bell"></i> Reminder schedule</div>
          <div class="row2">
            <div><label>Frequency</label><select id="lib-freq"><option value="">No reminder</option><option value="4">Every 4 hours</option><option value="6">Every 6 hours</option><option value="8">Every 8 hours</option><option value="12">Every 12 hours</option><option value="24">Once daily</option></select></div>
            <div><label>How many days?</label><input type="number" id="lib-days" placeholder="e.g. 7" min="1"/></div>
          </div>
          <div class="row2"><div><label>First dose date</label><input type="date" id="lib-nd"/></div><div><label>First dose time</label><input type="time" id="lib-nt"/></div></div>
          <div class="end-preview" id="end-preview"></div>
        </div>
        <div class="flex-end"><button class="btn btn-primary" onclick="addMed()"><i class="ti ti-plus"></i> Add medication</button></div>
      </div>
    </div>
  </div>

  <div id="panel-reminders" style="display:none;">
    <div class="notif-bar" id="notif-bar"><i class="ti ti-bell"></i> Enable browser notifications so reminders alert you in the background. <button onclick="askNotif()" style="margin-left:10px;padding:3px 10px;border-radius:6px;border:1px solid #f59e0b;background:transparent;color:#92400e;cursor:pointer;font-size:12px;">Enable</button></div>
    <div id="rem-list"></div>
  </div>

  <div id="panel-history" style="display:none;">
    <div class="toolbar">
      <select id="hist-filter" onchange="renderHistory()" style="width:auto;"><option value="all">All entries</option><option value="med">Medications</option><option value="urine">Urine</option><option value="activity">Activities</option></select>
      <button class="btn-export" onclick="exportLog()"><i class="ti ti-download"></i> Export</button>
      <button class="btn-clear" onclick="clearAll()"><i class="ti ti-trash"></i> Clear all</button>
    </div>
    <div id="hist-list"></div>
  </div>
</div>
<div class="save-indicator" id="save-indicator">Saved</div>

<script>
const LS_E='rl_entries_v1';
const LS_M='rl_meds_v1';
const LS_R='rl_reminders_v1';

const SEED_E=[
  {type:'urine',date:'6/24/2026',time:'4:45 PM',amount:250,color:'Yellow',notes:'',ts:1},
  {type:'med',date:'6/24/2026',time:'6:20 PM',name:'Hidrocortizone',dose:'5mg',count:'5 Pills',notes:'25mg Total',ts:2},
  {type:'activity',date:'6/24/2026',time:'6:20 PM',name:'Nasal Irrigation',notes:'',ts:3},
  {type:'urine',date:'6/24/2026',time:'6:20 PM',amount:250,color:'',notes:'',ts:4},
  {type:'activity',date:'6/24/2026',time:'6:20 PM',name:'Bath',notes:'',ts:5},
  {type:'urine',date:'6/24/2026',time:'8:00 PM',amount:250,color:'Pale yellow',notes:'',ts:6},
  {type:'med',date:'6/24/2026',time:'8:40 PM',name:'Amoxicillin-clavulanate',dose:'875-125mg',count:'1 Pill',notes:'',ts:7},
  {type:'med',date:'6/24/2026',time:'10:15 PM',name:'Zoloft',dose:'',count:'1 Pill',notes:'',ts:8},
  {type:'med',date:'6/24/2026',time:'10:15 PM',name:'Tylenol',dose:'500mg',count:'2 Pills',notes:'',ts:9},
  {type:'urine',date:'6/24/2026',time:'10:30 PM',amount:300,color:'Pale yellow',notes:'',ts:10},
  {type:'med',date:'6/24/2026',time:'11:37 PM',name:'Allegra',dose:'',count:'1 Pill',notes:'',ts:11},
  {type:'urine',date:'6/25/2026',time:'12:18 AM',amount:300,color:'Pale yellow',notes:'',ts:12},
  {type:'urine',date:'6/25/2026',time:'3:13 AM',amount:100,color:'Yellow',notes:'',ts:13},
  {type:'urine',date:'6/25/2026',time:'5:00 AM',amount:300,color:'Pale yellow',notes:'',ts:14},
  {type:'med',date:'6/25/2026',time:'7:00 AM',name:'Tylenol',dose:'500mg',count:'2 Pills',notes:'',ts:15},
  {type:'urine',date:'6/25/2026',time:'7:00 AM',amount:300,color:'Pale yellow',notes:'',ts:16},
  {type:'urine',date:'6/25/2026',time:'8:30 AM',amount:100,color:'Yellow',notes:'',ts:17},
  {type:'med',date:'6/25/2026',time:'9:30 AM',name:'Hidrocortizone',dose:'5mg',count:'3 Pills',notes:'15mg total',ts:18},
  {type:'med',date:'6/25/2026',time:'9:30 AM',name:'Amoxicillin-clavulanate',dose:'875-125mg',count:'1 Pill',notes:'',ts:19},
  {type:'med',date:'6/25/2026',time:'9:30 AM',name:'Allegra',dose:'',count:'1 Pill',notes:'',ts:20},
  {type:'urine',date:'6/25/2026',time:'10:10 AM',amount:500,color:'Pale yellow',notes:'',ts:21},
  {type:'med',date:'6/25/2026',time:'10:18 AM',name:'Losartan',dose:'',count:'1 Pill',notes:'',ts:22},
  {type:'urine',date:'6/25/2026',time:'11:00 AM',amount:500,color:'Yellow',notes:'',ts:23},
  {type:'urine',date:'6/25/2026',time:'11:55 AM',amount:600,color:'Pale yellow',notes:'',ts:24},
  {type:'med',date:'6/25/2026',time:'1:45 PM',name:'Miralax',dose:'',count:'1 packet',notes:'',ts:25},
  {type:'urine',date:'6/25/2026',time:'2:00 PM',amount:300,color:'Yellow',notes:'',ts:26},
  {type:'med',date:'6/25/2026',time:'3:10 AM',name:'Tylenol',dose:'500mg',count:'2 Pills',notes:'',ts:27},
  {type:'urine',date:'6/25/2026',time:'3:37 AM',amount:550,color:'Pale yellow',notes:'',ts:28},
  {type:'urine',date:'6/26/2026',time:'4:21 AM',amount:400,color:'Pale yellow',notes:'',ts:29},
  {type:'activity',date:'6/26/2026',time:'4:21 AM',name:'Nasal Irrigation',notes:'',ts:30},
  {type:'activity',date:'6/26/2026',time:'4:21 AM',name:'Bath',notes:'',ts:31},
  {type:'urine',date:'6/26/2026',time:'6:15 AM',amount:350,color:'Yellow',notes:'',ts:32},
];

const SEED_M=[
  {id:101,name:'Hidrocortizone',dose:'5mg',count:'',notes:'',slots:['Morning'],freq:null,days:null,nextDate:'',nextTime:'',endDate:''},
  {id:102,name:'Amoxicillin-clavulanate',dose:'875-125mg',count:'1 Pill',notes:'',slots:['Morning','Evening'],freq:12,days:10,nextDate:'',nextTime:'',endDate:''},
  {id:103,name:'Zoloft',dose:'',count:'1 Pill',notes:'',slots:['Morning'],freq:24,days:null,nextDate:'',nextTime:'',endDate:''},
  {id:104,name:'Tylenol',dose:'500mg',count:'2 Pills',notes:'',slots:['Morning','Evening'],freq:12,days:null,nextDate:'',nextTime:'',endDate:''},
  {id:105,name:'Allegra',dose:'',count:'1 Pill',notes:'',slots:['Morning'],freq:24,days:null,nextDate:'',nextTime:'',endDate:''},
  {id:106,name:'Losartan',dose:'',count:'1 Pill',notes:'',slots:['Morning'],freq:24,days:null,nextDate:'',nextTime:'',endDate:''},
  {id:107,name:'Miralax',dose:'',count:'1 packet',notes:'',slots:['As needed'],freq:null,days:null,nextDate:'',nextTime:'',endDate:''},
];

const COLORS=[{l:'Clear',bg:'#f0f8ff',c:'#1a4a6b'},{l:'Pale yellow',bg:'#fff9c4',c:'#7a6500'},{l:'Yellow',bg:'#fdd835',c:'#5a4100'},{l:'Dark yellow',bg:'#f9a825',c:'#4a2d00'},{l:'Orange',bg:'#e65100',c:'#fff'},{l:'Pink/red',bg:'#b71c1c',c:'#fff'}];
const ALL_SLOTS=['Morning','Around noon','Evening','Bedtime','As needed'];
const SLOT_ICONS={'Morning':'ti-sun','Around noon':'ti-clock','Evening':'ti-moon','Bedtime':'ti-zzz','As needed':'ti-alert-circle'};
const FREQ_MAP={1:24,2:12,3:8,4:6,5:4};

let entries=[],meds=[],reminders=[];
let selClr='',editTs=null,editMedId=null,editRemId=null,editClr='';
let selSlots=[],addOpen=false,ticker=null;

function lsGet(k){try{const v=localStorage.getItem(k);return v?JSON.parse(v):null;}catch(e){return null;}}
function lsSet(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}

function load(){
  const stored=lsGet(LS_E);
  if(stored){const ts=new Set(stored.map(e=>e.ts));const missing=SEED_E.filter(e=>!ts.has(e.ts));entries=[...stored,...missing];}
  else entries=[...SEED_E];
  lsSet(LS_E,entries);
  const sm=lsGet(LS_M);meds=sm||[...SEED_M];if(!sm)lsSet(LS_M,meds);
  const sr=lsGet(LS_R);reminders=sr||[];
  updateCounts();populateDropdown();checkNotifPerm();startTicker();
}

function saveE(){lsSet(LS_E,entries);flash();}
function saveM(){lsSet(LS_M,meds);flash();}
function saveR(){lsSet(LS_R,reminders);flash();}
function flash(){const el=document.getElementById('save-indicator');el.style.opacity='1';setTimeout(()=>el.style.opacity='0',1500);}
function updateCounts(){document.getElementById('hist-count').textContent=entries.length;document.getElementById('med-count').textContent=meds.length;document.getElementById('rem-count').textContent=reminders.filter(r=>r.active).length;}

document.getElementById('date-display').textContent=new Date().toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'});

function setDefaults(){
  const now=new Date(),d=now.toISOString().split('T')[0],hh=String(now.getHours()).padStart(2,'0'),mm=String(now.getMinutes()).padStart(2,'0');
  ['med','urine','act'].forEach(p=>{document.getElementById(p+'-date').value=d;document.getElementById(p+'-time').value=hh+':'+mm;});
  document.getElementById('lib-nd').value=d;document.getElementById('lib-nt').value=hh+':'+mm;
}
setDefaults();

'text',m.notes));r2.appendChild(cd);r2.appendChild(nt);form.appendChild(r2);const sw=mkEl('div');sw.style.marginBottom='10px';sw.appendChild(mkLabel('When to take'));const sg=mkEl('div');sg.style.cssText='display:flex;flex-wrap:wrap;gap:8px;margin-top:4px;';ALL_SLOTS.forEach(s=>{const lbl=document.createElement('label');lbl.style.cssText='display:flex;align-items:center;gap:4px;font-size:12px;cursor:pointer;';const cb=document.createElement('input');cb.type='checkbox';cb.id='ms-'+s.replace(/\s+/g,'-');cb.style.width='auto';if(m.slots&&m.slots.includes(s))cb.checked=true;lbl.appendChild(cb);lbl.appendChild(document.createTextNode(s));sg.appendChild(lbl);});sw.appendChild(sg);form.appendChild(sw);const r3=mkEl('div','edit-row');const fd=mkEl('div');fd.appendChild(mkLabel('Frequency'));const fs=document.createElement('select');fs.className='edit-input';fs.id='me-freq';[['','No reminder'],['4','Every 4h'],['6','Every 6h'],['8','Every 8h'],['12','Every 12h'],['24','Once daily']].forEach(([v,t])=>{const o=document.createElement('option');o.value=v;o.textContent=t;if(String(m.freq)==v)o.selected=true;fs.appendChild(o);});fd.appendChild(fs);const dyd=mkEl('div');dyd.appendChild(mkLabel('Days'));dyd.appendChild(mkInput('me-days','number',m.days||''));r3.appendChild(fd);r3.appendChild(dyd);form.appendChild(r3);const r4=mkEl('div','edit-row');const ndd=mkEl('div');ndd.appendChild(mkLabel('Next date'));ndd.appendChild(mkInput('me-nd','date',toId(m.nextDate)));const ntd=mkEl('div');ntd.appendChild(mkLabel('Next time'));ntd.appendChild(mkInput('me-nt','time',toIt(m.nextTime)));r4.appendChild(ndd);r4.appendChild(ntd);form.appendChild(r4);const ac=mkEl('div');ac.style.cssText='display:flex;gap:6px;justify-content:flex-end;margin-top:8px;';const cb2=mkEl('button','btn-sm','Cancel');cb2.onclick=cancelEditMed;const sb=mkEl('button','btn-save','Save');sb.onclick=()=>saveEditMed(m.id);ac.appendChild(cb2);ac.appendChild(sb);form.appendChild(ac);card.appendChild(form);}list.appendChild(ca function nextMs(r){if(!r.nextDate||!r.nextTime)return null;const t=r.nextTime.match(/(\d+):(\d+)\s*(AM|PM)/i);if(!t)return null;let h=parseInt(t[1]);const ap=t[3].toUpperCase();if(ap==='PM'&&h!==12)h+=12;if(ap==='AM'&&h===12)h=0;const dp=r.nextDate.split('/');return new Date(parseInt(dp[2]),parseInt(dp[0])-1,parseInt(dp[1]),h,parseInt(t[2]),0).getTime();}
function endMs(r){if(!r.endDate)return null;const dp=r.endDate.split('/');return new Date(parseInt(dp[2]),parseInt(dp[0])-1,parseInt(dp[1]),23,59,59).getTime();}
function fmtCd(ms){const s=Math.floor(ms/1000);const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sc=s%60;return(h>0?h+'h ':'')+m+'m '+sc+'s';}
function advanceDose(r){const f=parseInt(r.freq);if(!f)return;const ms=nextMs(r);if(!ms)return;const next=new Date(ms+f*3600*1000);r.nextDate=next.toLocaleDateString();r.nextTime=next.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});const m=meds.find(m=>m.id===r.id);if(m){m.nextDate=r.nextDate;m.nextTime=r.nextTime;saveM();}saveR();}

let lastNotified={};
function checkNotifications(){if(!('Notification' in window)||Notification.permission!=='granted')return;const now=Date.now();reminders.forEach(r=>{if(!r.active)return;const ms=nextMs(r);if(!ms)return;const diff=ms-now;if(diff<=0&&diff>-60000&&(!lastNotified[r.id]||now-lastNotified[r.id]>60000)){lastNotified[r.id]=now;new Notification('Time for '+r.name+'!',{body:(r.dose?r.dose+' ':'')+(r.count||'')});}});}

function renderReminders(){const list=document.getElementById('rem-list');if(!list)return;const active=reminders.filter(r=>r.active);if(!active.length){list.innerHTML='<div class="empty">No active reminders. Set a first dose time on a medication to activate a reminder.</div>';return;}const now=Date.now();let html='';active.forEach(r=>{const isE=editRemId===r.id;const ms=nextMs(r);const em=endMs(r);const done=em&&now>em;const diff=ms?ms-now:null;const overdue=diff!==null&&diff<0&&!done;let cdHtml='',prHtml='';if(done)cdHtml='<div class="countdown done"><i class="ti ti-check"></i> Treatment course complete</div>';else if(diff!==null){const cd=fmtCd(Math.abs(diff));const lbl=overdue?'Overdue by '+cd:(diff<30*60*1000?'⚠ Due in '+cd:'Next dose in '+cd);cdHtml=`<div class="countdown${overdue?' overdue':''}">${lbl}</div>`;if(r.freq&&diff>0){const pct=Math.max(0,Math.min(100,100-(diff/(r.freq*3600*1000))*100));prHtml=`<div class="progress-wrap"><div class="progress-bar" style="width:${pct.toFixed(1)}%"></div></div>`;}}const m=meds.find(m=>m.id===r.id);const slots=m&&m.slots&&m.slots.length?'<div style="margin-top:4px;">'+slotsHtml(m.slots)+'</div>':'';const fl=r.freq===24?'Once daily':`Every ${r.freq}h`;const dl=m&&m.days?` · ${m.days}d`:'';const remEditForm=isE?`<div style="margin-top:10px;border-top:1px solid #c7d9fd;padding-top:10px;"><div class="edit-row"><div><label class="edit-label">Name</label><input class="edit-input" type="text" id="re-name" value="${(r.name||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;')}"/></div><div><label class="edit-label">Dose</label><input class="edit-input" type="text" id="re-dose" value="${(r.dose||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;')}"/></div></div><div class="edit-row"><div><label class="edit-label">Count</label><input class="edit-input" type="text" id="re-count" value="${(r.count||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;')}"/></div><div><label class="edit-label">Frequency</label><select class="edit-input" id="re-fre function markTaken(id){const r=reminders.find(r=>r.id===id);if(!r)return;advanceDose(r);const now=new Date();entries.push({type:'med',date:now.toLocaleDateString(),time:now.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'}),name:r.name,dose:r.dose||'',count:r.count||'',notes:'via reminder',ts:Date.now()});updateCounts();saveE();renderReminders();toast(r.name+' logged!');}
function delReminder(id){if(!confirm('Remove this reminder?'))return;reminders=reminders.filter(r=>r.id!==id);const m=meds.find(m=>m.id===id);if(m){m.freq=null;m.nextDate='';m.nextTime='';m.endDate='';saveM();}saveR();updateCounts();renderReminders();}

function sortKey(e){const dp=(e.date||'').split('/');const nd=dp.length===3?dp[2]+'-'+dp[0].padStart(2,'0')+'-'+dp[1].padStart(2,'0'):e.date||'';const tp=(e.time||'').match(/(\d+):(\d+)\s*(AM|PM)/i);let nt='00:00';if(tp){let h=parseInt(tp[1]);const ap=tp[3].toUpperCase();if(ap==='PM'&&h!==12)h+=12;if(ap==='AM'&&h===12)h=0;nt=String(h).padStart(2,'0')+':'+tp[2];}return nd+' '+nt;}

function buildHistEdit(e,container){const form=mkEl('div','edit-form');const dr=mkEl('div','edit-row');const dc=mkEl('div');dc.appendChild(mkLabel('Date'));dc.appendChild(mkInput('he-date','date',toId(e.date)));const tc=mkEl('div');tc.appendChild(mkLabel('Time'));tc.appendChild(mkInput('he-time','time',toIt(e.time)));dr.appendChild(dc);dr.appendChild(tc);form.appendChild(dr);if(e.type==='med'){const r1=mkEl('div','edit-row');const n=mkEl('div');n.appendChild(mkLabel('Name'));n.appendChild(mkInput('he-name','text',e.name));const d=mkEl('div');d.appendChild(mkLabel('Dose'));d.appendChild(mkInput('he-dose','text',e.dose));r1.appendChild(n);r1.appendChild(d);form.appendChild(r1);const r2=mkEl('div','edit-row');const c=mkEl('div');c.appendChild(mkLabel('Count'));c.appendChild(mkInput('he-count','text',e.count));const nt=mkEl('div');nt.appendChild(mkLabel('Notes'));nt.appendChild(mkInput('he-notes','text',e.notes));r2.appendChild(c);r2.appendChild(nt);form.appendChild(r2);}else if(e.type==='urine'){editClr=e.color||'';const r1=mkEl('div','edit-row');const a=mkEl('div');a.appendChild(mkLabel('Amount (mL)'));const ai=mkInput('he-amount','number',e.amount||'');ai.min='0';a.appendChild(ai);const nt=mkEl('div');nt.appendChild(mkLabel('Notes'));nt.appendChild(mkInput('he-notes','text',e.notes));r1.appendChild(a);r1.appendChild(nt);form.appendChild(r1);const cl=mkEl('div');cl.style.marginBottom='8px';cl.appendChild(mkLabel('Color'));const cg=mkEl('div','color-grid');COLORS.forEach(c=>{const btn=document.createElement('button');btn.className='color-btn'+(e.color===c.l?' selected':'');btn.style.background=c.bg;btn.style.color=c.c;btn.textContent=c.l;btn.onclick=()=>{document.querySelectorAll('.color-btn').forEach(b=>b.classList.remove('selected'));btn.classList.add('selected');editClr=c.l;};cg.appendChild(btn);});cl.appendChild(cg);form.appendChild(cl);}else{const r1=mkEl('div','edit-row');const n=mkEl('div');n.appendChild(mkLabel('Activity'));n.appendChild(mkInput('he-name','text',e.name));const nt=mkEl('div');nt.appendChild(mkLabel('Notes'));nt.appendChild(mkInput('he-notes','text',e.notes));r1.appendChild(n);r1.appendChild(nt);form.appendChild(r1);}const ac=mkEl('div');ac.style.cssText='display:flex;gap:6px;justify-content:flex-end;margin-top:8px;';const cb=mkEl('button','btn-sm','Cancel');cb.onclick=()=>{editTs=null;renderHistory();};const sb=mkEl('button','btn-save','Save');sb.onclick=()=>saveHistEdit(e.ts);ac.appendChild(cb);ac.appendChild(sb);form.appendChild(ac);container.appendChild(form);}

function saveHistEdit(ts){const idx=entries.findIndex(e=>e.ts===ts);if(idx===-1)return;const e=entries[idx];const nd=document.getElementById('he-date').value;const nt=document.getElementById('he-time').value;if(nd)e.date=dispDate(nd);if(nt)e.time=fmt(nt);if(e.type==='med'){const n=document.getElementById('he-name').value.trim();if(n)e.name=n;e.dose=document.getElementById('he-dose').value.trim();e.count=document.getElementById('he-count').value.trim();e.notes=document.getElementById('he-notes').value.trim();}else if(e.type==='urine'){const amt=document.getElementById('he-amount').value;e.amount=amt?parseInt(amt):null;if(editClr)e.color=editClr;e.notes=document.getElementById('he-notes').value.trim();}else{const n=document.getElementById('he-name').value.trim();if(n)e.name=n;e.notes=document.getElementById('he-notes').value.trim();}editTs=null;saveE();renderHistory();toast('Entry updated');}

function renderHistory(){const filter=document.getElementById('hist-filter').value;const filtered=entries.filter(e=>filter==='all'||e.type===filter);const sorted=[...filtered].sort((a,b)=>sortKey(a)<sortKey(b)?-1:1);const list=document.getElementById('hist-list');list.innerHTML='';if(!sorted.length){list.innerHTML='<div class="empty">No entries yet.</div>';return;}let lastDate='';sorted.forEach(e=>{const isE=editTs===e.ts;if(e.date!==lastDate){const div=mkEl('div','date-divider',e.date||'Unknown date');list.appendChild(div);lastDate=e.date;}const card=mkEl('div','entry'+(isE?' editing':''));const hdr=mkEl('div','entry-header');const info=mkEl('div','entry-info');if(e.type==='med'){const b=mkEl('div','badge badge-med','Medication');info.appendChild(b);const t=mkEl('div','entry-title',e.name);info.appendChild(t);const d=mkEl('div','entry-detail',[e.time,e.dose,e.count,e.notes].filter(Boolean).join(' · '));info.appendChild(d);}else if(e.type==='urine'){const b=mkEl('div','badge badge-urine','Urine');info.appendChild(b);const t=mkEl('div','entry-title',e.time);info.appendChild(t);const p=[];if(e.amount)p.push(e.amount+' mL');if(e.color)p.push(e.color);if(e.notes)p.push(e.notes);const d=mkEl('div','entry-detail',p.join(' · ')||'No details');info.appendChild(d);}else{const b=mkEl('div','badge badge-activity','Activity');info.appendChild(b);const t=mkEl('div','entry-title',e.name);info.appendChild(t);const d=mkEl('div','entry-detail',[e.time,e.notes].filter(Boolean).join(' · '));info.appendChild(d);}const acts=mkEl('div','entry-actions');const eb=mkEl('button','btn-sm');eb.innerHTML='<i class="ti ti-edit"></i>';eb.onclick=()=>{editTs=editTs===e.ts?null:e.ts;renderHistory();};const db=mkEl('button','btn-danger');db.innerHTML='<i class="ti ti-trash"></i>';db.onclick=()=>delEntry(e.ts);acts.appendChild(eb);acts.appendChild(db);hdr.appendChild(info);hdr.appendChild(acts);card.appendChild(hdr);if(isE)buildHistEdit(e,card);list.appendChild(card);});}

function delEntry(ts){if(!confirm('Delete?'))return;entries=entries.filter(e=>e.ts!==ts);editTs=null;updateCounts();saveE();renderHistory();}
function clearAll(){if(!confirm('Clear ALL entries? Cannot be undone.'))return;entries=[];editTs=null;updateCounts();saveE();renderHistory();}

function exportLog(){if(!entries.length){alert('No entries.');return;}const sorted=[...entries].sort((a,b)=>sortKey(a)<sortKey(b)?-1:1);const lines=['Recovery Log Export — '+new Date().toLocaleDateString(),''];let lastDate='';sorted.forEach(e=>{if(e.date!==lastDate){lines.push('\n--- '+e.date+' ---');lastDate=e.date;}if(e.type==='med')lines.push(`[${e.time}] MEDICATION: ${e.name}${e.dose?' '+e.dose:''}${e.count?' · '+e.count:''}${e.notes?' ('+e.notes+')':''}`);else if(e.type==='urine'){const p=[];if(e.amount)p.push(e.amount+' mL');if(e.color)p.push(e.color);if(e.notes)p.push(e.notes);lines.push(`[${e.time}] URINE: ${p.join(', ')||'logged'}`);}else lines.push(`[${e.time}] ACTIVITY: ${e.name}${e.notes?' ('+e.notes+')':''}`);});const blob=new Blob([lines.join('\n')],{type:'text/plain'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='recovery-log-'+new Date().toISOString().slice(0,10)+'.txt';a.click();}

function toast(msg){const t=document.createElement('div');t.textContent=msg;Object.assign(t.style,{position:'fixed',bottom:'20px',left:'50%',transform:'translateX(-50%)',background:'#1a56db',color:'#fff',padding:'10px 20px',borderRadius:'8px',fontSize:'14px',fontWeight:'600',zIndex:'999',opacity:'1',transition:'opacity 0.4s',whiteSpace:'nowrap'});document.body.appendChild(t);setTimeout(()=>{t.style.opacity='0';setTimeout(()=>t.remove(),400);},1800);}

load();
</script>
