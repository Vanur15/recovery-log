<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Recovery Log</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css"/>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f0;color:#1a1a18;min-height:100vh;}
  .app{max-width:700px;margin:0 auto;padding:1.5rem 1rem 4rem;}
  h1{font-size:22px;font-weight:600;margin-bottom:4px;}
  .subtitle{font-size:14px;color:#666;margin-bottom:1.5rem;}
  .tabs{display:flex;gap:6px;margin-bottom:1.5rem;flex-wrap:wrap;}
  .tab{padding:7px 14px;border-radius:8px;border:1px solid #ddd;background:transparent;cursor:pointer;font-size:13px;color:#666;}
  .tab.active{background:#e8f0fe;color:#1a56db;border-color:#93b4f8;font-weight:600;}
  .card{background:#fff;border:1px solid #e5e5e0;border-radius:12px;padding:1.25rem;margin-bottom:1rem;}
  .section-title{font-size:17px;font-weight:600;margin-bottom:14px;display:flex;align-items:center;gap:8px;}
  label{font-size:13px;color:#555;margin-bottom:5px;display:block;}
  input,select{width:100%;padding:8px 10px;border:1px solid #ddd;border-radius:8px;font-size:14px;background:#fff;color:#1a1a18;font-family:inherit;}
  input:focus,select:focus{outline:none;border-color:#93b4f8;box-shadow:0 0 0 2px rgba(147,180,248,0.3);}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
  .mb{margin-bottom:12px;}
  .flex-end{display:flex;justify-content:flex-end;gap:8px;margin-top:14px;}
  .btn{padding:9px 18px;border-radius:8px;border:none;font-size:14px;font-weight:600;cursor:pointer;}
  .btn-primary{background:#1a56db;color:#fff;}
  .btn-primary:hover{background:#1447c0;}
  .btn-skip{background:#fff;color:#92400e;border:2px solid #f59e0b;border-radius:8px;padding:6px 16px;font-size:13px;font-weight:600;cursor:pointer;}
  .btn-skip:hover{background:#fef3c7;}
  .btn-log{background:#1a56db;color:#fff;border:none;border-radius:8px;padding:6px 16px;font-size:13px;font-weight:600;cursor:pointer;}
  .btn-log:hover{background:#1447c0;}
  .btn-sm{background:transparent;color:#888;border:1px solid #ddd;border-radius:6px;padding:4px 10px;font-size:12px;cursor:pointer;}
  .btn-danger{background:transparent;color:#dc2626;border:1px solid #fca5a5;border-radius:6px;padding:4px 10px;font-size:12px;cursor:pointer;}
  .btn-save{background:#1a56db;color:#fff;border:none;border-radius:6px;padding:4px 12px;font-size:12px;font-weight:600;cursor:pointer;}
  .btn-export{background:#fff;color:#333;border:1px solid #ddd;border-radius:8px;padding:8px 16px;font-size:13px;cursor:pointer;font-weight:500;}
  .btn-import{background:#fff;color:#1a56db;border:1px solid #93b4f8;border-radius:8px;padding:8px 16px;font-size:13px;cursor:pointer;font-weight:500;}
  .btn-clear{background:transparent;color:#dc2626;border:1px solid #fca5a5;border-radius:8px;padding:8px 16px;font-size:13px;cursor:pointer;}
  .entry{border:1px solid #e5e5e0;border-radius:8px;padding:10px 14px;margin-bottom:8px;background:#fafaf8;}
  .entry.editing{border-color:#93b4f8;background:#f0f5ff;}
  .entry-header{display:flex;justify-content:space-between;align-items:flex-start;}
  .entry-info{flex:1;min-width:0;}
  .badge{display:inline-block;font-size:11px;padding:2px 8px;border-radius:20px;font-weight:600;margin-bottom:3px;}
  .badge-med{background:#e8f0fe;color:#1a56db;}
  .badge-urine{background:#d1fae5;color:#065f46;}
  .badge-activity{background:#fef3c7;color:#92400e;}
  .badge-skipped{background:#fee2e2;color:#991b1b;}
  .entry-title{font-size:14px;font-weight:600;color:#1a1a18;margin:2px 0 2px;}
  .entry-detail{font-size:13px;color:#666;}
  .entry-actions{display:flex;gap:6px;flex-shrink:0;margin-left:8px;}
  .date-divider{font-size:11px;font-weight:700;color:#999;margin:14px 0 6px;text-transform:uppercase;letter-spacing:0.06em;border-top:1px solid #eee;padding-top:10px;}
  .empty{color:#999;font-size:14px;text-align:center;padding:28px 0;}
  .color-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:6px;}
  .color-btn{border:2.5px solid transparent;border-radius:8px;padding:10px 4px;font-size:12px;cursor:pointer;text-align:center;font-weight:600;transition:transform 0.1s,box-shadow 0.1s;}
  .color-btn.selected{border-color:#222;font-size:13px;font-weight:800;transform:scale(1.08);box-shadow:0 2px 8px rgba(0,0,0,0.18);}
  .color-label{font-size:13px;font-weight:600;margin-top:8px;min-height:18px;color:#333;}
  .slot-grid{display:flex;flex-wrap:wrap;gap:8px;margin-top:6px;}
  .slot-btn{border:2px solid #ccc;border-radius:20px;padding:7px 14px;font-size:13px;cursor:pointer;background:#f5f5f0;color:#555;font-weight:500;transition:transform 0.1s,box-shadow 0.1s;display:flex;align-items:center;gap:5px;}
  .slot-btn.selected{border:3px solid #222;background:#e8f0fe;color:#1a56db;font-weight:700;font-size:14px;transform:scale(1.06);box-shadow:0 2px 8px rgba(0,0,0,0.15);}
  .slot-label{font-size:13px;font-weight:600;margin-top:8px;min-height:18px;color:#333;}
  .freq-hint{font-size:12px;color:#1a56db;margin-top:5px;min-height:16px;font-weight:500;}
  .med-card{border:1px solid #e5e5e0;border-radius:8px;padding:12px 14px;margin-bottom:8px;background:#fafaf8;}
  .med-card.as-needed-card{border-left:4px solid #a855f7;background:#fdf8ff;}
  .med-card.scheduled-card{border-left:4px solid #1a56db;background:#f8faff;}
  .med-card.editing{border-color:#93b4f8;background:#f0f5ff;}
  .med-name{font-size:14px;font-weight:600;}
  .med-detail{font-size:12px;color:#666;margin-top:2px;}
  .med-section-label{font-size:11px;font-weight:700;color:#999;text-transform:uppercase;letter-spacing:0.06em;margin:16px 0 6px;padding-bottom:4px;border-bottom:1px solid #eee;}
  .reminder-card{border:1px solid #93b4f8;border-radius:12px;padding:1rem 1.25rem;margin-bottom:10px;background:#f0f5ff;}
  .reminder-card.overdue-card{border-color:#fca5a5;background:#fff5f5;}
  .reminder-card.asn-card{border-left:4px solid #a855f7;background:#fdf8ff;border-color:#d8b4fe;}
  .reminder-name{font-size:15px;font-weight:600;}
  .reminder-meta{font-size:12px;color:#555;margin-top:2px;}
  .countdown{font-size:22px;font-weight:700;color:#1a56db;margin:8px 0 4px;font-variant-numeric:tabular-nums;}
  .countdown.overdue{color:#dc2626;}
  .countdown.done{color:#999;font-size:14px;}
  .progress-wrap{height:5px;background:#dde;border-radius:3px;margin-top:8px;overflow:hidden;}
  .progress-bar{height:5px;background:#1a56db;border-radius:3px;}
  .overdue-box{margin-top:10px;border-top:1px solid #fca5a5;padding-top:10px;}
  .overdue-title{font-size:12px;font-weight:700;color:#991b1b;margin-bottom:8px;}
  .action-row{display:flex;gap:10px;align-items:center;}
  .edit-form{margin-top:10px;border-top:1px solid #c7d9fd;padding-top:10px;}
  .edit-input{width:100%;box-sizing:border-box;font-size:13px;padding:6px 8px;border-radius:6px;border:1px solid #ccc;background:#fff;color:#1a1a18;font-family:inherit;}
  .edit-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;}
  .edit-label{font-size:11px;color:#666;margin-bottom:4px;display:block;}
  .add-toggle{font-size:13px;color:#1a56db;cursor:pointer;display:flex;align-items:center;gap:6px;font-weight:600;margin-bottom:12px;}
  .notif-bar{background:#fef3c7;border:1px solid #fcd34d;border-radius:8px;padding:10px 14px;margin-bottom:12px;font-size:13px;color:#92400e;display:none;}
  .save-indicator{position:fixed;bottom:20px;right:20px;background:#1a56db;color:#fff;padding:10px 18px;border-radius:8px;font-size:14px;font-weight:600;z-index:999;opacity:0;transition:opacity 0.4s;pointer-events:none;}
  .end-preview{font-size:12px;color:#666;margin-top:6px;min-height:16px;}
  .toolbar{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap;}
  .rem-section-label{font-size:11px;font-weight:700;color:#999;text-transform:uppercase;letter-spacing:0.06em;margin:12px 0 8px;padding-bottom:4px;border-bottom:1px solid #eee;}
</style>
</head>
<body>
<div class="app">
  <h1>Recovery log</h1>
  <div class="subtitle" id="date-display"></div>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('log')" id="tab-log">Log entry</button>
    <button class="tab" onclick="switchTab('medications')" id="tab-medications">Medications (<span id="med-count">0</span>)</button>
    <button class="tab" onclick="switchTab('reminders')" id="tab-reminders">Reminders (<span id="rem-count">0</span>)</button>
    <button class="tab" onclick="switchTab('history')" id="tab-history">History (<span id="hist-count">0</span>)</button>
  </div>

  <!-- LOG -->
  <div id="panel-log">
    <div class="card">
      <div class="section-title"><i class="ti ti-pill"></i> Medication</div>
      <div class="row2"><div><label>Date</label><input type="date" id="med-date"/></div><div><label>Time taken</label><input type="time" id="med-time"/></div></div>
      <div class="mb"><label>Select medication</label><select id="med-select" onchange="fillFromLib()"><option value="">— choose or enter manually below —</option></select></div>
      <div class="row2"><div><label>Medication name</label><input type="text" id="med-name" placeholder="e.g. Tylenol"/></div><div><label>Dose</label><input type="text" id="med-dose" placeholder="e.g. 500mg"/></div></div>
      <div class="row2"><div><label>Count</label><input type="text" id="med-count-in" placeholder="e.g. 2 pills"/></div><div><label>Notes</label><input type="text" id="med-notes" placeholder="e.g. with food"/></div></div>
      <div class="flex-end"><button class="btn btn-primary" onclick="logMed()"><i class="ti ti-plus"></i> Log medication</button></div>
    </div>
    <div class="card">
      <div class="section-title"><i class="ti ti-droplet"></i> Urine output</div>
      <div class="row2"><div><label>Date</label><input type="date" id="urine-date"/></div><div><label>Time</label><input type="time" id="urine-time"/></div></div>
      <div class="row2"><div><label>Amount (mL)</label><input type="number" id="urine-amount" placeholder="e.g. 250" min="0"/></div><div><label>Notes</label><input type="text" id="urine-notes" placeholder="e.g. odor, urgency"/></div></div>
      <div class="mb">
        <label>Color</label>
        <div class="color-grid">
          <button class="color-btn" style="background:#f0f8ff;color:#1a4a6b;" onclick="selColorFn(this,'Clear')">Clear</button>
          <button class="color-btn" style="background:#fff9c4;color:#7a6500;" onclick="selColorFn(this,'Pale yellow')">Pale yellow</button>
          <button class="color-btn" style="background:#fdd835;color:#5a4100;" onclick="selColorFn(this,'Yellow')">Yellow</button>
          <button class="color-btn" style="background:#f9a825;color:#4a2d00;" onclick="selColorFn(this,'Dark yellow')">Dark yellow</button>
          <button class="color-btn" style="background:#e65100;color:#fff;" onclick="selColorFn(this,'Orange')">Orange</button>
          <button class="color-btn" style="background:#b71c1c;color:#fff;" onclick="selColorFn(this,'Pink/red')">Pink/red</button>
        </div>
        <div class="color-label" id="color-label">No color selected</div>
      </div>
      <div class="flex-end"><button class="btn btn-primary" onclick="logUrine()"><i class="ti ti-plus"></i> Log urine output</button></div>
    </div>
    <div class="card">
      <div class="section-title"><i class="ti ti-activity"></i> Activity / other</div>
      <div class="row2"><div><label>Date</label><input type="date" id="act-date"/></div><div><label>Time</label><input type="time" id="act-time"/></div></div>
      <div class="row2"><div><label>Activity</label><input type="text" id="act-name" placeholder="e.g. Bath, Nasal Irrigation"/></div><div><label>Notes</label><input type="text" id="act-notes" placeholder="e.g. tolerated well"/></div></div>
      <div class="flex-end"><button class="btn btn-primary" onclick="logActivity()"><i class="ti ti-plus"></i> Log activity</button></div>
    </div>
  </div>

  <!-- MEDICATIONS -->
  <div id="panel-medications" style="display:none;">
    <div id="med-lib-list"></div>
    <div class="card" style="margin-top:8px;">
      <div class="add-toggle" onclick="toggleAddForm()"><i class="ti ti-plus" id="add-icon"></i><span id="add-label">Add new medication</span></div>
      <div id="add-form" style="display:none;">
        <div class="row2"><div><label>Medication name</label><input type="text" id="lib-name" placeholder="e.g. Tylenol"/></div><div><label>Dose</label><input type="text" id="lib-dose" placeholder="e.g. 500mg"/></div></div>
        <div class="row2"><div><label>Count</label><input type="text" id="lib-count" placeholder="e.g. 2 pills"/></div><div><label>Notes</label><input type="text" id="lib-notes" placeholder="e.g. with food"/></div></div>
        <div class="mb">
          <label>When to take <span style="font-weight:400;color:#999;">(select all that apply)</span></label>
          <div class="slot-grid" id="lib-slots">
            <button class="slot-btn" onclick="toggleSlot(this,'Morning')"><i class="ti ti-sun"></i>Morning</button>
            <button class="slot-btn" onclick="toggleSlot(this,'Around noon')"><i class="ti ti-clock"></i>Around noon</button>
            <button class="slot-btn" onclick="toggleSlot(this,'Evening')"><i class="ti ti-moon"></i>Evening</button>
            <button class="slot-btn" onclick="toggleSlot(this,'Bedtime')"><i class="ti ti-zzz"></i>Bedtime</button>
            <button class="slot-btn" onclick="toggleSlot(this,'As needed')"><i class="ti ti-alert-circle"></i>As needed</button>
          </div>
          <div class="slot-label" id="slot-label">No time selected</div>
          <div class="freq-hint" id="freq-hint"></div>
        </div>
        <div style="border-top:1px solid #eee;margin:12px 0;padding-top:12px;">
          <div style="font-size:13px;font-weight:600;color:#666;margin-bottom:10px;"><i class="ti ti-bell"></i> Reminder schedule</div>
          <div class="row2">
            <div><label>Frequency</label><select id="lib-freq"><option value="">No reminder</option><option value="4">Every 4 hours</option><option value="6">Every 6 hours</option><option value="8">Every 8 hours</option><option value="12">Every 12 hours</option><option value="24">Once daily</option></select></div>
            <div><label>How many days?</label><input type="number" id="lib-days" placeholder="e.g. 7" min="1"/></div>
          </div>
          <div class="row2"><div><label>First dose date</label><input type="date" id="lib-nd"/></div><div><label>First dose time</label><input type="time" id="lib-nt"/></div></div>
          <div class="end-preview" id="end-preview"></div>
        </div>
        <div class="flex-end"><button class="btn btn-primary" onclick="addMed()"><i class="ti ti-plus"></i> Add medication</button></div>
      </div>
    </div>
  </div>

  <!-- REMINDERS -->
  <div id="panel-reminders" style="display:none;">
    <div class="notif-bar" id="notif-bar"><i class="ti ti-bell"></i> Enable browser notifications so reminders alert you in the background. <button onclick="askNotif()" style="margin-left:10px;padding:3px 10px;border-radius:6px;border:1px solid #f59e0b;background:transparent;color:#92400e;cursor:pointer;font-size:12px;">Enable</button></div>
    <div id="rem-list"></div>
  </div>

  <!-- HISTORY -->
  <div id="panel-history" style="display:none;">
    <div class="toolbar">
      <select id="hist-filter" onchange="renderHistory()" style="width:auto;"><option value="all">All entries</option><option value="med">Medications</option><option value="urine">Urine</option><option value="activity">Activities</option><option value="skipped">Skipped doses</option></select>
      <button class="btn-export" onclick="exportLog()"><i class="ti ti-download"></i> Export</button>
      <button class="btn-import" onclick="document.getElementById('import-input').click()"><i class="ti ti-upload"></i> Import</button>
      <input type="file" id="import-input" accept=".txt" style="display:none;" onchange="importLog(event)"/>
      <button class="btn-clear" onclick="clearAll()"><i class="ti ti-trash"></i> Clear all</button>
    </div>
    <div id="hist-list"></div>
  </div>
</div>
<div class="save-indicator" id="save-indicator">Saved</div>

var entries=[],meds=[],reminders=[];

function lsGet(k){try{var v=localStorage.getItem(k);return v?JSON.parse(v):null;}catch(e){return null;}}
function lsSet(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}
function isAsNeeded(m){return m.slots&&m.slots.length===1&&m.slots[0]==='As needed'&&!m.freq;}

function load(){
  var deletedTs=new Set(lsGet(LS_DEL)||[]);
  var stored=lsGet(LS_E);
  if(stored){
    var storedTs=new Set(stored.map(function(e){return e.ts;}));
    var missing=SEED_E.filter(function(e){return !storedTs.has(e.ts)&&!deletedTs.has(e.ts);});
    entries=stored.concat(missing);
  } else {
    entries=SEED_E.filter(function(e){return !deletedTs.has(e.ts);});
  }
  lsSet(LS_E,entries);
  var sm=lsGet(LS_M); meds=sm||SEED_M.slice(); if(!sm)lsSet(LS_M,meds);
  var sr=lsGet(LS_R); reminders=sr||SEED_R.slice(); if(!sr)lsSet(LS_R,reminders);
  updateCounts(); populateDropdown(); checkNotifPerm(); startTicker();
}

function saveE(){lsSet(LS_E,entries);flash();}
function saveM(){lsSet(LS_M,meds);flash();}
function saveR(){lsSet(LS_R,reminders);flash();}
function flash(){var el=document.getElementById('save-indicator');el.style.opacity='1';setTimeout(function(){el.style.opacity='0';},1500);}
function updateCounts(){
  document.getElementById('hist-count').textContent=entries.length;
  document.getElementById('med-count').textContent=meds.length;
  document.getElementById('rem-count').textContent=reminders.filter(function(r){return r.active;}).length;
}

document.getElementById('date-display').textContent=new Date().toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'});

function setDefaults(){
  var now=new Date(),d=now.toISOString().split('T')[0];
  var hh=String(now.getHours()).padStart(2,'0'),mm=String(now.getMinutes()).padStart(2,'0');
  ['med','urine','act'].forEach(function(p){document.getElementById(p+'-date').value=d;document.getElementById(p+'-time').value=hh+':'+mm;});
  document.getElementById('lib-nd').value=d; document.getElementById('lib-nt').value=hh+':'+mm;
}
setDefaults();

document.getElementById('lib-days').addEventListener('input',updateEndPreview);
document.getElementById('lib-nd').addEventListener('input',updateEndPreview);
function updateEndPreview(){
  var days=parseInt(document.getElementById('lib-days').value);
  var sd=document.getElementById('lib-nd').value;
  var prev=document.getElementById('end-preview');
  if(days>0&&sd){var e=new Date(sd+'T00:00:00');e.setDate(e.getDate()+days-1);prev.textContent='Treatment ends: '+e.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric',year:'numeric'});}
  else prev.textContent='';
}

function switchTab(tab){
  editTs=null;editMedId=null;editRemId=null;
  ['log','medications','reminders','history'].forEach(function(t){
    document.getElementById('panel-'+t).style.display=t===tab?'block':'none';
    document.getElementById('tab-'+t).className='tab'+(t===tab?' active':'');
  });
  if(tab==='history')renderHistory();
  if(tab==='reminders')renderReminders();
  if(tab==='medications')renderMeds();
}

function selColorFn(btn,c){document.querySelectorAll('.color-btn').forEach(function(b){b.classList.remove('selected');});btn.classList.add('selected');selClr=c;document.getElementById('color-label').textContent='Selected: '+c;}
function toggleSlot(btn,s){btn.classList.toggle('selected');if(selSlots.indexOf(s)>=0)selSlots=selSlots.filter(function(x){return x!==s;});else selSlots.push(s);updateSlotLabel();autoFreq();}
function updateSlotLabel(){var l=document.getElementById('slot-label');if(l)l.textContent=selSlots.length?'Selected: '+selSlots.join(', '):'No time selected';}
function autoFreq(){
  var f=document.getElementById('lib-freq');var h=document.getElementById('freq-hint');
  var timed=selSlots.filter(function(s){return s!=='As needed';});
  if(selSlots.length===1&&selSlots[0]==='As needed'){f.value='';if(h)h.textContent='As needed — no automatic reminder.';return;}
  var n=timed.length;if(!n){f.value='';if(h)h.textContent='';return;}
  var v=FREQ_MAP[Math.min(n,5)]||24;f.value=String(v);
  if(h)h.textContent='Auto-set to '+(v===24?'once daily':'every '+v+' hours')+' based on '+n+' slot'+(n>1?'s':'');
}
function resetSlots(){selSlots=[];document.querySelectorAll('#lib-slots .slot-btn').forEach(function(b){b.classList.remove('selected');});updateSlotLabel();var h=document.getElementById('freq-hint');if(h)h.textContent='';document.getElementById('end-preview').textContent='';}
function toggleAddForm(){addOpen=!addOpen;document.getElementById('add-form').style.display=addOpen?'block':'none';document.getElementById('add-icon').className=addOpen?'ti ti-minus':'ti ti-plus';document.getElementById('add-label').textContent=addOpen?'Hide form':'Add new medication';}

function fmt(t){if(!t)return '';var parts=t.split(':');var h=parseInt(parts[0]);var m=parts[1];return(h%12||12)+':'+m+' '+(h>=12?'PM':'AM');}
function dispDate(di){if(!di)return new Date().toLocaleDateString();return new Date(di+'T00:00:00').toLocaleDateString();}
function toId(d){if(!d)return '';var p=d.split('/');return p.length===3?p[2]+'-'+p[0].padStart(2,'0')+'-'+p[1].padStart(2,'0'):'';}
function toIt(t){if(!t)return '';var m=t.match(/(\d+):(\d+)\s*(AM|PM)/i);if(!m)return '';var h=parseInt(m[1]);var ap=m[3].toUpperCase();if(ap==='PM'&&h!==12)h+=12;if(ap==='AM'&&h===12)h=0;return String(h).padStart(2,'0')+':'+m[2];}
function calcEnd(sd,days){if(!sd||!days)return '';var d=new Date(sd+'T00:00:00');d.setDate(d.getDate()+parseInt(days)-1);return d.toLocaleDateString();}

function populateDropdown(){
  var sel=document.getElementById('med-select');var prev=sel.value;
  sel.innerHTML='<option value="">— choose or enter manually below —</option>';
  var scheduled=meds.filter(function(m){return !isAsNeeded(m);});
  var asn=meds.filter(function(m){return isAsNeeded(m);});
  if(scheduled.length){var og=document.createElement('optgroup');og.label='Scheduled';scheduled.forEach(function(m){var o=document.createElement('option');o.value=m.id;o.textContent=m.name+(m.dose?' — '+m.dose:'')+(m.count?' ('+m.count+')':'');og.appendChild(o);});sel.appendChild(og);}
  if(asn.length){var og2=document.createElement('optgroup');og2.label='As needed';asn.forEach(function(m){var o=document.createElement('option');o.value=m.id;o.textContent=m.name+(m.dose?' — '+m.dose:'')+(m.count?' ('+m.count+')':'');og2.appendChild(o);});sel.appendChild(og2);}
  sel.value=prev;
}
function fillFromLib(){var id=parseInt(document.getElementById('med-select').value);if(!id)return;var m=meds.find(function(m){return m.id===id;});if(!m)return;document.getElementById('med-name').value=m.name||'';document.getElementById('med-dose').value=m.dose||'';document.getElementById('med-count-in').value=m.count||'';document.getElementById('med-notes').value=m.notes||'';}

function logMed(){var name=document.getElementById('med-name').value.trim();var time=document.getElementById('med-time').value;if(!name||!time){alert('Enter medication name and time.');return;}entries.push({type:'med',date:dispDate(document.getElementById('med-date').value),time:fmt(time),name:name,dose:document.getElementById('med-dose').value.trim(),count:document.getElementById('med-count-in').value.trim(),notes:document.getElementById('med-notes').value.trim(),ts:Date.now()});['med-name','med-dose','med-count-in','med-notes'].forEach(function(id){document.getElementById(id).value='';});document.getElementById('med-select').value='';updateCounts();saveE();toast('Medication logged');}
function logUrine(){var time=document.getElementById('urine-time').value;if(!time){alert('Enter time.');return;}var amt=document.getElementById('urine-amount').value;entries.push({type:'urine',date:dispDate(document.getElementById('urine-date').value),time:fmt(time),amount:amt?parseInt(amt):null,color:selClr,notes:document.getElementById('urine-notes').value.trim(),ts:Date.now()});document.getElementById('urine-amount').value='';document.getElementById('urine-notes').value='';document.querySelectorAll('.color-btn').forEach(function(b){b.classList.remove('selected');});selClr='';document.getElementById('color-label').textContent='No color selected';updateCounts();saveE();toast('Urine logged');}
function logActivity(){var name=document.getElementById('act-name').value.trim();var time=document.getElementById('act-time').value;if(!name||!time){alert('Enter activity and time.');return;}entries.push({type:'activity',date:dispDate(document.getElementById('act-date').value),time:fmt(time),name:name,notes:document.getElementById('act-notes').value.trim(),ts:Date.now()});document.getElementById('act-name').value='';document.getElementById('act-notes').value='';updateCounts();saveE();toast('Activity logged');}

function addMed(){
  var name=document.getElementById('lib-name').value.trim();if(!name){alert('Enter name.');return;}
  var freq=document.getElementById('lib-freq').value;var days=document.getElementById('lib-days').value;
  var nd=document.getElementById('lib-nd').value;var nt=document.getElementById('lib-nt').value;
  var endDate=calcEnd(nd,days);var id=Date.now();var slots=selSlots.slice();
  var anOnly=slots.length===1&&slots[0]==='As needed';
  meds.push({id:id,name:name,dose:document.getElementById('lib-dose').value.trim(),count:document.getElementById('lib-count').value.trim(),notes:document.getElementById('lib-notes').value.trim(),slots:slots,freq:freq?parseInt(freq):null,days:days?parseInt(days):null,nextDate:nd&&!anOnly?dispDate(nd):'',nextTime:nt&&!anOnly?fmt(nt):'',endDate:!anOnly?endDate:''});
  if(freq&&nd&&nt&&!anOnly){reminders.push({id:id,active:true,name:name,dose:document.getElementById('lib-dose').value.trim(),count:document.getElementById('lib-count').value.trim(),freq:parseInt(freq),nextDate:dispDate(nd),nextTime:fmt(nt),endDate:endDate});saveR();}
  ['lib-name','lib-dose','lib-count','lib-notes','lib-days'].forEach(function(i){document.getElementById(i).value='';});
  document.getElementById('lib-freq').value='';resetSlots();if(addOpen)toggleAddForm();
  updateCounts();saveM();populateDropdown();renderMeds();toast('Medication added'+(freq&&!anOnly?' + reminder set':''));
}

function delMed(id){
  if(!confirm('Remove this medication?'))return;
  meds=meds.filter(function(m){return m.id!==id;});
  reminders=reminders.filter(function(r){return r.id!==id;});
  saveM();saveR();updateCounts();populateDropdown();renderMeds();
  var rp=document.getElementById('panel-reminders');if(rp&&rp.style.display!=='none')renderReminders();
  toast('Medication removed');
}
function startEditMed(id){editMedId=editMedId===id?null:id;renderMeds();}
function cancelEditMed(){editMedId=null;renderMeds();}
function saveEditMed(id){
  var m=meds.find(function(m){return m.id===id;});if(!m)return;
  var n=document.getElementById('me-name').value.trim();if(n)m.name=n;
  m.dose=document.getElementById('me-dose').value.trim();
  m.count=document.getElementById('me-count').value.trim();
  m.notes=document.getElementById('me-notes').value.trim();
  m.slots=ALL_SLOTS.filter(function(s){var el=document.getElementById('ms-'+s.replace(/\s+/g,'-'));return el&&el.checked;});
  var freq=document.getElementById('me-freq').value;var days=document.getElementById('me-days').value;
  var nd=document.getElementById('me-nd').value;var nt=document.getElementById('me-nt').value;
  m.freq=freq?parseInt(freq):null;m.days=days?parseInt(days):null;
  if(nd)m.nextDate=dispDate(nd);if(nt)m.nextTime=fmt(nt);
  m.endDate=calcEnd(nd||toId(m.nextDate),days);
  var ri=reminders.findIndex(function(r){return r.id===id;});
  if(freq&&m.nextDate&&m.nextTime){var rd={id:id,active:true,name:m.name,dose:m.dose,count:m.count,freq:parseInt(freq),nextDate:m.nextDate,nextTime:m.nextTime,endDate:m.endDate};if(ri>=0)reminders[ri]=rd;else reminders.push(rd);}
  else if(ri>=0)reminders.splice(ri,1);
  saveM();saveR();updateCounts();populateDropdown();editMedId=null;renderMeds();
  var rp=document.getElementById('panel-reminders');if(rp&&rp.style.display!=='none')renderReminders();
  toast('Medication updated');
}

function slotsHtml(slots){if(!slots||!slots.length)return '';return slots.map(function(s){return '<span style="display:inline-flex;align-items:center;gap:3px;font-size:11px;padding:2px 8px;border-radius:20px;background:#e8f0fe;color:#1a56db;font-weight:600;margin:2px 2px 0 0;"><i class="ti '+(SLOT_ICONS[s]||'ti-clock')+'" style="font-size:11px;"></i>'+s+'</span>';}).join('');}
function mkEl(tag,cls,txt){var e=document.createElement(tag);if(cls)e.className=cls;if(txt!==undefined)e.textContent=txt;return e;}
function mkInput(id,type,val,ph){var i=document.createElement('input');i.className='edit-input';i.type=type;i.id=id;i.value=val||'';if(ph)i.placeholder=ph;return i;}
function mkLabel(txt){var l=document.createElement('label');l.className='edit-label';l.textContent=txt;return l;}

function renderMeds(){
  var list=document.getElementById('med-lib-list');list.innerHTML='';
  if(!meds.length){list.innerHTML='<div class="empty">No medications yet.</div>';return;}
  var scheduled=meds.filter(function(m){return !isAsNeeded(m);});
  var asn=meds.filter(function(m){return isAsNeeded(m);});
  if(scheduled.length){var lbl=mkEl('div','med-section-label');lbl.innerHTML='<i class="ti ti-bell" style="margin-right:5px;font-size:11px;vertical-align:-1px;"></i>Scheduled medications';list.appendChild(lbl);scheduled.forEach(function(m){list.appendChild(buildMedCard(m));});}
  if(asn.length){var lbl2=mkEl('div','med-section-label');lbl2.innerHTML='<i class="ti ti-alert-circle" style="margin-right:5px;font-size:11px;vertical-align:-1px;"></i>As needed medications';list.appendChild(lbl2);asn.forEach(function(m){list.appendChild(buildMedCard(m));});}
}

  var dt=mkEl('div','med-detail',[m.count,m.notes,remStr].filter(Boolean).join(' · '));info.appendChild(dt);
  if(m.slots&&m.slots.length){var sw=mkEl('div');sw.style.marginTop='4px';sw.innerHTML=slotsHtml(m.slots);info.appendChild(sw);}
  if(!an&&m.nextDate&&m.nextTime){var nd=mkEl('div');nd.style.cssText='font-size:11px;color:#999;margin-top:4px;';nd.innerHTML='<i class="ti ti-bell" style="margin-right:3px;"></i>Next: '+m.nextDate+' at '+m.nextTime;info.appendChild(nd);}
  var acts=mkEl('div','entry-actions');
  var eb=mkEl('button','btn-sm');eb.innerHTML='<i class="ti ti-edit"></i>';eb.onclick=function(){startEditMed(m.id);};
  var db=mkEl('button','btn-danger');db.innerHTML='<i class="ti ti-trash"></i>';db.onclick=function(){delMed(m.id);};
  acts.appendChild(eb);acts.appendChild(db);hdr.appendChild(info);hdr.appendChild(acts);card.appendChild(hdr);
  if(isE){
    var form=mkEl('div','edit-form');
    var r1=mkEl('div','edit-row');var nd2=mkEl('div');nd2.appendChild(mkLabel('Name'));nd2.appendChild(mkInput('me-name','text',m.name));var dd=mkEl('div');dd.appendChild(mkLabel('Dose'));dd.appendChild(mkInput('me-dose','text',m.dose));r1.appendChild(nd2);r1.appendChild(dd);form.appendChild(r1);
    var r2=mkEl('div','edit-row');var cd=mkEl('div');cd.appendChild(mkLabel('Count'));cd.appendChild(mkInput('me-count','text',m.count));var ntd=mkEl('div');ntd.appendChild(mkLabel('Notes'));ntd.appendChild(mkInput('me-notes','text',m.notes));r2.appendChild(cd);r2.appendChild(ntd);form.appendChild(r2);
    var sw2=mkEl('div');sw2.style.marginBottom='10px';sw2.appendChild(mkLabel('When to take'));var sg=mkEl('div');sg.style.cssText='display:flex;flex-wrap:wrap;gap:8px;margin-top:4px;';ALL_SLOTS.forEach(function(s){var lbl=document.createElement('label');lbl.style.cssText='display:flex;align-items:center;gap:4px;font-size:12px;cursor:pointer;';var cb=document.createElement('input');cb.type='checkbox';cb.id='ms-'+s.replace(/\s+/g,'-');cb.style.width='auto';if(m.slots&&m.slots.indexOf(s)>=0)cb.checked=true;lbl.appendChild(cb);lbl.appendChild(document.createTextNode(s));sg.appendChild(lbl);});sw2.appendChild(sg);form.appendChild(sw2);
    var r3=mkEl('div','edit-row');var fd=mkEl('div');fd.appendChild(mkLabel('Frequency'));var fs=document.createElement('select');fs.className='edit-input';fs.id='me-freq';[['','No reminder'],['4','Every 4h'],['6','Every 6h'],['8','Every 8h'],['12','Every 12h'],['24','Once daily']].forEach(function(vt){var o=document.createElement('option');o.value=vt[0];o.textContent=vt[1];if(String(m.freq)==vt[0])o.selected=true;fs.appendChild(o);});fd.appendChild(fs);var dyd=mkEl('div');dyd.appendChild(mkLabel('Days'));dyd.appendChild(mkInput('me-days','number',m.days||''));r3.appendChild(fd);r3.appendChild(dyd);form.appendChild(r3);
    var r4=mkEl('div','edit-row');var ndd=mkEl('div');ndd.appendChild(mkLabel('Next date'));ndd.appendChild(mkInput('me-nd','date',toId(m.nextDate)));var ntd2=mkEl('div');ntd2.appendChild(mkLabel('Next time'));ntd2.appendChild(mkInput('me-nt','time',toIt(m.nextTime)));r4.appendChild(ndd);r4.appendChild(ntd2);form.appendChild(r4);
    var ac=mkEl('div');ac.style.cssText='display:flex;gap:6px;justify-content:flex-end;margin-top:8px;';var cb2=mkEl('button','btn-sm','Cancel');cb2.onclick=cancelEditMed;var sb=mkEl('button','btn-save','Save');sb.onclick=function(){saveEditMed(m.id);};ac.appendChild(cb2);ac.appendChild(sb);form.appendChild(ac);
    card.appendChild(form);
  }
  return card;

// REMINDERS
function nextMs(r){if(!r.nextDate||!r.nextTime)return null;var t=r.nextTime.match(/(\d+):(\d+)\s*(AM|PM)/i);if(!t)return null;var h=parseInt(t[1]);var ap=t[3].toUpperCase();if(ap==='PM'&&h!==12)h+=12;if(ap==='AM'&&h===12)h=0;var dp=r.nextDate.split('/');return new Date(parseInt(dp[2]),parseInt(dp[0])-1,parseInt(dp[1]),h,parseInt(t[2]),0).getTime();}
function endMs(r){if(!r.endDate)return null;var dp=r.endDate.split('/');return new Date(parseInt(dp[2]),parseInt(dp[0])-1,parseInt(dp[1]),23,59,59).getTime();}
function fmtCd(ms){var s=Math.floor(ms/1000);var h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sc=s%60;return(h>0?h+'h ':'')+m+'m '+sc+'s';}
function advanceDose(r){var f=parseInt(r.freq);if(!f)return;var ms=nextMs(r);if(!ms)return;var next=new Date(ms+f*3600*1000);r.nextDate=next.toLocaleDateString();r.nextTime=next.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});var m=meds.find(function(m){return m.id===r.id;});if(m){m.nextDate=r.nextDate;m.nextTime=r.nextTime;saveM();}saveR();}

function markTaken(id){var r=reminders.find(function(r){return r.id===id;});if(!r)return;var now=new Date();entries.push({type:'med',date:now.toLocaleDateString(),time:now.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'}),name:r.name,dose:r.dose||'',count:r.count||'',notes:'via reminder',ts:Date.now()});advanceDose(r);updateCounts();saveE();renderReminders();toast(r.name+' logged!');}
function skipDose(id){var r=reminders.find(function(r){return r.id===id;});if(!r)return;var now=new Date();entries.push({type:'skipped',date:now.toLocaleDateString(),time:now.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'}),name:r.name,dose:r.dose||'',count:r.count||'',notes:'dose skipped',ts:Date.now()});advanceDose(r);updateCounts();saveE();renderReminders();toast(r.name+' skipped — next dose scheduled.');}
function logAsNeeded(id){var m=meds.find(function(m){return m.id===id;});if(!m)return;var now=new Date();entries.push({type:'med',date:now.toLocaleDateString(),time:now.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'}),name:m.name,dose:m.dose||'',count:m.count||'',notes:'as needed',ts:Date.now()});updateCounts();saveE();toast(m.name+' logged!');}

function checkNotifPerm(){if('Notification' in window&&Notification.permission==='default')document.getElementById('notif-bar').style.display='block';}
function askNotif(){Notification.requestPermission().then(function(p){var b=document.getElementById('notif-bar');if(p==='granted'){b.style.display='none';toast('Notifications enabled!');}else{b.innerHTML='<i class="ti ti-bell-off"></i> Notifications blocked. Countdown still works here.';}});}

var lastNotified={};
function checkNotifications(){if(!('Notification' in window)||Notification.permission!=='granted')return;var now=Date.now();reminders.forEach(function(r){if(!r.active)return;var ms=nextMs(r);if(!ms)return;var diff=ms-now;if(diff<=0&&diff>-60000&&(!lastNotified[r.id]||now-lastNotified[r.id]>60000)){lastNotified[r.id]=now;var notif=new Notification('Time for '+r.name+'!',{body:'Open the app to Log it or Skip.',requireInteraction:true});notif.onclick=function(){window.focus();switchTab('reminders');};}});}
function startTicker(){if(ticker)clearInterval(ticker);ticker=setInterval(function(){var p=document.getElementById('panel-reminders');if(p&&p.style.display!=='none')renderReminders();checkNotifications();},1000);}

function startEditRem(id){editRemId=editRemId===id?null:id;renderReminders();}
function cancelEditRem(){editRemId=null;renderReminders();}
function saveEditRem(id){
  var r=reminders.find(function(r){return r.id===id;});if(!r)return;
  var n=document.getElementById('re-name').value.trim();if(n)r.name=n;
  r.dose=document.getElementById('re-dose').value.trim();r.count=document.getElementById('re-count').value.trim();
  var f=document.getElementById('re-freq').value;if(f)r.freq=parseInt(f);
  var days=document.getElementById('re-days').value;var nd=document.getElementById('re-nd').value;var nt=document.getElementById('re-nt').value;
  if(nd)r.nextDate=dispDate(nd);if(nt)r.nextTime=fmt(nt);r.endDate=calcEnd(nd||toId(r.nextDate),days);
  var m=meds.find(function(m){return m.id===id;});if(m){m.name=r.name;m.dose=r.dose;m.count=r.count;m.freq=r.freq;m.days=days?parseInt(days):m.days;m.nextDate=r.nextDate;m.nextTime=r.nextTime;m.endDate=r.endDate;saveM();populateDropdown();}
  editRemId=null;saveR();updateCounts();renderReminders();toast('Reminder updated');
}
function delReminder(id){
  if(!confirm('Remove this reminder?'))return;
  reminders=reminders.filter(function(r){return r.id!==id;});
  var m=meds.find(function(m){return m.id===id;});if(m){m.freq=null;m.nextDate='';m.nextTime='';m.endDate='';saveM();}
  saveR();updateCounts();renderReminders();
  var mp=document.getElementById('panel-medications');if(mp&&mp.style.display!=='none')renderMeds();
  toast('Reminder removed');
}

function renderReminders(){
  var list=document.getElementById('rem-list');if(!list)return;
  var active=reminders.filter(function(r){return r.active;});
  var asnMeds=meds.filter(function(m){return isAsNeeded(m);});
  if(!active.length&&!asnMeds.length){list.innerHTML='<div class="empty">No reminders yet. Add medications in the Medications tab.</div>';return;}
  var now=Date.now();var html='';

  // SCHEDULED
  if(active.length){
    html+='<div class="rem-section-label"><i class="ti ti-bell" style="margin-right:5px;font-size:11px;vertical-align:-1px;"></i>Scheduled</div>';
    active.forEach(function(r){
      var isE=editRemId===r.id;var ms=nextMs(r);var em=endMs(r);var done=em&&now>em;var diff=ms?ms-now:null;var overdue=diff!==null&&diff<0&&!done;
      var cdHtml='';var prHtml='';
      if(done){cdHtml='<div class="countdown done"><i class="ti ti-check"></i> Treatment course complete</div>';}
      else if(diff!==null){var cd=fmtCd(Math.abs(diff));var lbl=overdue?'Overdue by '+cd:(diff<30*60*1000?'Due in '+cd:'Next dose in '+cd);cdHtml='<div class="countdown'+(overdue?' overdue':'')+'">'+lbl+'</div>';if(r.freq&&diff>0){var pct=Math.max(0,Math.min(100,100-(diff/(r.freq*3600*1000))*100));prHtml='<div class="progress-wrap"><div class="progress-bar" style="width:'+pct.toFixed(1)+'%"></div></div>';}}
      var m=meds.find(function(m){return m.id===r.id;});
      var slots=m&&m.slots&&m.slots.length?'<div style="margin-top:4px;">'+slotsHtml(m.slots)+'</div>':'';
      var fl=r.freq===24?'Once daily':'Every '+r.freq+'h';var dl=m&&m.days?' · '+m.days+'d':'';
      var overdueBox=overdue&&!isE?'<div class="overdue-box"><div class="overdue-title"><i class="ti ti-bell-ringing" style="margin-right:5px;"></i>Dose is overdue — what happened?</div><div class="action-row"><button class="btn-log" onclick="markTaken('+r.id+')"><i class="ti ti-check" style="margin-right:4px;"></i>Log it</button><button class="btn-skip" onclick="skipDose('+r.id+')"><i class="ti ti-x" style="margin-right:4px;"></i>Skip</button></div></div>':'';
      var editForm=isE?'<div style="margin-top:10px;border-top:1px solid #c7d9fd;padding-top:10px;"><div class="edit-row"><div><label class="edit-label">Name</label><input class="edit-input" type="text" id="re-name" value="'+escHtml(r.name||'')+'"/></div><div><label class="edit-label">Dose</label><input class="edit-input" type="text" id="re-dose" value="'+escHtml(r.dose||'')+'"/></div></div><div class="edit-row"><div><label class="edit-label">Count</label><input class="edit-input" type="text" id="re-count" value="'+escHtml(r.count||'')+'"/></div><div><label class="edit-label">Frequency</label><select class="edit-input" id="re-freq"><option value="4" '+(r.freq==4?'selected':'')+'>Every 4h</option><option value="6" '+(r.freq==6?'selected':'')+'>Every 6h</option><option value="8" '+(r.freq==8?'selected':'')+'>Every 8h</option><option value="12" '+(r.freq==12?'selected':'')+'>Every 12h</option><option value="24" '+(r.freq==24?'selected':'')+'>Once daily</option></select></div></div><div class="edit-row"><div><label class="edit-label">Days</label><input class="edit-input" type="number" id="re-days" value="'+(m&&m.days?m.days:'')+'" min="1"/></div><div></div></div><div class="edit-row"><div><label class="edit-label">Next date</label><input class="edit-input" type="date" id="re-nd" value="'+toId(r.nextDate)+'"/></div><div><label class="edit-label">Next time</label><input class="edit-input" type="time" id="re-nt" value="'+toIt(r.nextTime)+'"/></div></div><div style="display:flex;gap:6px;justify-content:flex-end;margin-top:8px;"><button class="btn-sm" onclick="cancelEditRem()">Cancel</button><button class="btn-save" onclick="saveEditRem('+r.id+')">Save</button></div></div>':'';
      html+='<div class="reminder-card'+(overdue?' overdue-card':'')+'"><div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:8px;"><div><div class="reminder-name"><i class="ti ti-pill" style="margin-right:6px;"></i>'+r.name+(r.dose?' — '+r.dose:'')+'</div><div class="reminder-meta">'+(r.count?r.count+' · ':'')+fl+dl+(r.endDate?' · Until '+r.endDate:'')+'</div>'+slots+'</div><div style="display:flex;gap:6px;align-items:center;"><button class="btn-sm" onclick="startEditRem('+r.id+')"><i class="ti ti-edit"></i></button><button class="btn-danger" onclick="delReminder('+r.id+')"><i class="ti ti-trash"></i></button></div></div>'+(!isE?cdHtml:'')+(!isE?prHtml:'')+(!isE&&!done?'<div style="font-size:12px;color:#999;margin-top:6px;">Next: '+r.nextDate+' at '+r.nextTime+'</div>':'')+overdueBox+editForm+'</div>';
    });
  }

  // AS NEEDED
  if(asnMeds.length){
    html+='<div class="rem-section-label"><i class="ti ti-alert-circle" style="margin-right:5px;font-size:11px;vertical-align:-1px;"></i>As needed</div>';
    asnMeds.forEach(function(m){
      html+='<div class="reminder-card asn-card"><div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;"><div><div class="reminder-name"><i class="ti ti-pill" style="margin-right:6px;"></i>'+m.name+(m.dose?' — '+m.dose:'')+'</div><div class="reminder-meta">'+(m.count?m.count+' · ':'')+'Take as needed'+(m.notes?' · '+m.notes:'')+'</div></div><button class="btn-log" onclick="logAsNeeded('+m.id+')" style="background:#a855f7;"><i class="ti ti-plus" style="margin-right:4px;"></i>Log dose</button></div></div>';
    });
  }
  list.innerHTML=html;
}

function escHtml(s){return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// HISTORY
function sortKey(e){var dp=(e.date||'').split('/');var nd=dp.length===3?dp[2]+'-'+dp[0].padStart(2,'0')+'-'+dp[1].padStart(2,'0'):e.date||'';var tp=(e.time||'').match(/(\d+):(\d+)\s*(AM|PM)/i);var nt='00:00';if(tp){var h=parseInt(tp[1]);var ap=tp[3].toUpperCase();if(ap==='PM'&&h!==12)h+=12;if(ap==='AM'&&h===12)h=0;nt=String(h).padStart(2,'0')+':'+tp[2];}return nd+' '+nt;}

function buildHistEdit(e,container){
  var form=mkEl('div','edit-form');
  var dr=mkEl('div','edit-row');var dc=mkEl('div');dc.appendChild(mkLabel('Date'));dc.appendChild(mkInput('he-date','date',toId(e.date)));var tc=mkEl('div');tc.appendChild(mkLabel('Time'));tc.appendChild(mkInput('he-time','time',toIt(e.time)));dr.appendChild(dc);dr.appendChild(tc);form.appendChild(dr);
  if(e.type==='med'||e.type==='skipped'){var r1=mkEl('div','edit-row');var n=mkEl('div');n.appendChild(mkLabel('Name'));n.appendChild(mkInput('he-name','text',e.name));var d=mkEl('div');d.appendChild(mkLabel('Dose'));d.appendChild(mkInput('he-dose','text',e.dose));r1.appendChild(n);r1.appendChild(d);form.appendChild(r1);var r2=mkEl('div','edit-row');var c=mkEl('div');c.appendChild(mkLabel('Count'));c.appendChild(mkInput('he-count','text',e.count));var nt=mkEl('div');nt.appendChild(mkLabel('Notes'));nt.appendChild(mkInput('he-notes','text',e.notes));r2.appendChild(c);r2.appendChild(nt);form.appendChild(r2);}
  else if(e.type==='urine'){editClr=e.color||'';var r1=mkEl('div','edit-row');var a=mkEl('div');a.appendChild(mkLabel('Amount (mL)'));var ai=mkInput('he-amount','number',e.amount||'');ai.min='0';a.appendChild(ai);var nt2=mkEl('div');nt2.appendChild(mkLabel('Notes'));nt2.appendChild(mkInput('he-notes','text',e.notes));r1.appendChild(a);r1.appendChild(nt2);form.appendChild(r1);var cl=mkEl('div');cl.style.marginBottom='8px';cl.appendChild(mkLabel('Color'));var cg=mkEl('div','color-grid');COLORS.forEach(function(c){var btn=document.createElement('button');btn.className='color-btn'+(e.color===c.l?' selected':'');btn.style.background=c.bg;btn.style.color=c.c;btn.textContent=c.l;btn.onclick=function(){document.querySelectorAll('.color-btn').forEach(function(b){b.classList.remove('selected');});btn.classList.add('selected');editClr=c.l;};cg.appendChild(btn);});cl.appendChild(cg);form.appendChild(cl);}
  else{var r1=mkEl('div','edit-row');var n=mkEl('div');n.appendChild(mkLabel('Activity'));n.appendChild(mkInput('he-name','text',e.name));var nt3=mkEl('div');nt3.appendChild(mkLabel('Notes'));nt3.appendChild(mkInput('he-notes','text',e.notes));r1.appendChild(n);r1.appendChild(nt3);form.appendChild(r1);}
  var ac=mkEl('div');ac.style.cssText='display:flex;gap:6px;justify-content:flex-end;margin-top:8px;';var cb=mkEl('button','btn-sm','Cancel');cb.onclick=function(){editTs=null;renderHistory();};var sb=mkEl('button','btn-save','Save');sb.onclick=function(){saveHistEdit(e.ts);};ac.appendChild(cb);ac.appendChild(sb);form.appendChild(ac);container.appendChild(form);
}

function saveHistEdit(ts){
  var idx=entries.findIndex(function(e){return e.ts===ts;});if(idx===-1)return;var e=entries[idx];
  var nd=document.getElementById('he-date').value;var nt=document.getElementById('he-time').value;
  if(nd)e.date=dispDate(nd);if(nt)e.time=fmt(nt);
  if(e.type==='med'||e.type==='skipped'){var n=document.getElementById('he-name').value.trim();if(n)e.name=n;e.dose=document.getElementById('he-dose').value.trim();e.count=document.getElementById('he-count').value.trim();e.notes=document.getElementById('he-notes').value.trim();}
  else if(e.type==='urine'){var amt=document.getElementById('he-amount').value;e.amount=amt?parseInt(amt):null;if(editClr)e.color=editClr;e.notes=document.getElementById('he-notes').value.trim();}
  else{var n2=document.getElementById('he-name').value.trim();if(n2)e.name=n2;e.notes=document.getElementById('he-notes').value.trim();}
  editTs=null;saveE();renderHistory();toast('Entry updated');
}

function renderHistory(){
  var filter=document.getElementById('hist-filter').value;
  var filtered=entries.filter(function(e){return filter==='all'||(filter==='skipped'?e.type==='skipped':e.type===filter);});
  var sorted=filtered.slice().sort(function(a,b){return sortKey(a)<sortKey(b)?-1:1;});
  var list=document.getElementById('hist-list');list.innerHTML='';
  if(!sorted.length){list.innerHTML='<div class="empty">No entries yet.</div>';return;}
  var lastDate='';
  sorted.forEach(function(e){
    var isE=editTs===e.ts;
    if(e.date!==lastDate){var div=mkEl('div','date-divider',e.date||'Unknown date');list.appendChild(div);lastDate=e.date;}
    var card=mkEl('div','entry'+(isE?' editing':''));var hdr=mkEl('div','entry-header');var info=mkEl('div','entry-info');
    if(e.type==='med'){var b=mkEl('div','badge badge-med','Medication');info.appendChild(b);var t=mkEl('div','entry-title',e.name);info.appendChild(t);var d=mkEl('div','entry-detail',[e.time,e.dose,e.count,e.notes].filter(Boolean).join(' · '));info.appendChild(d);}
    else if(e.type==='skipped'){var b=mkEl('div','badge badge-skipped','Skipped');info.appendChild(b);var t=mkEl('div','entry-title',e.name);info.appendChild(t);var d=mkEl('div','entry-detail',[e.time,e.dose,e.notes].filter(Boolean).join(' · '));info.appendChild(d);}
    else if(e.type==='urine'){var b=mkEl('div','badge badge-urine','Urine');info.appendChild(b);var t=mkEl('div','entry-title',e.time);info.appendChild(t);var p=[];if(e.amount)p.push(e.amount+' mL');if(e.color)p.push(e.color);if(e.notes)p.push(e.notes);var d=mkEl('div','entry-detail',p.join(' · ')||'No details');info.appendChild(d);}
    else{var b=mkEl('div','badge badge-activity','Activity');info.appendChild(b);var t=mkEl('div','entry-title',e.name);info.appendChild(t);var d=mkEl('div','entry-detail',[e.time,e.notes].filter(Boolean).join(' · '));info.appendChild(d);}
    var acts=mkEl('div','entry-actions');
    var eb=mkEl('button','btn-sm');eb.innerHTML='<i class="ti ti-edit"></i>';eb.onclick=function(){editTs=editTs===e.ts?null:e.ts;renderHistory();};
    var db=mkEl('button','btn-danger');db.innerHTML='<i class="ti ti-trash"></i>';db.onclick=function(){delEntry(e.ts);};
    acts.appendChild(eb);acts.appendChild(db);hdr.appendChild(info);hdr.appendChild(acts);card.appendChild(hdr);
    if(isE)buildHistEdit(e,card);
    list.appendChild(card);
  });
}

function delEntry(ts){
  if(!confirm('Delete this entry?'))return;
  entries=entries.filter(function(e){return e.ts!==ts;});
  var deletedTs=lsGet(LS_DEL)||[];
  if(deletedTs.indexOf(ts)<0)deletedTs.push(ts);
  lsSet(LS_DEL,deletedTs);
  editTs=null;updateCounts();saveE();renderHistory();
}

function clearAll(){
  if(!confirm('Clear ALL history entries? This cannot be undone.'))return;
  entries=[];editTs=null;
  lsSet(LS_DEL,[]);
  lsSet(LS_E,[]);
  updateCounts();renderHistory();toast('All history cleared');
}

function exportLog(){
  var lines=[];var sep='==========================================';
  lines.push('RECOVERY LOG FULL EXPORT');
  lines.push('Date: '+new Date().toLocaleString());
  lines.push(sep);

  // Medications
  lines.push('');lines.push('MEDICATIONS ('+meds.length+' total)');lines.push(sep);
  var scheduled=meds.filter(function(m){return !isAsNeeded(m);});
  var asn=meds.filter(function(m){return isAsNeeded(m);});
  if(scheduled.length){lines.push('');lines.push('-- Scheduled --');scheduled.forEach(function(m){lines.push('MED: '+m.name+(m.dose?' | Dose: '+m.dose:'')+(m.count?' | Count: '+m.count:''));if(m.slots&&m.slots.length)lines.push('  When: '+m.slots.join(', '));if(m.freq)lines.push('  Frequency: '+(m.freq===24?'Once daily':'Every '+m.freq+'h')+(m.days?' | Days: '+m.days:''));if(m.endDate)lines.push('  Until: '+m.endDate);if(m.nextDate&&m.nextTime)lines.push('  Next dose: '+m.nextDate+' at '+m.nextTime);if(m.notes)lines.push('  Notes: '+m.notes);});}
  if(asn.length){lines.push('');lines.push('-- As needed --');asn.forEach(function(m){lines.push('MED: '+m.name+(m.dose?' | Dose: '+m.dose:'')+(m.count?' | Count: '+m.count:''));if(m.notes)lines.push('  Notes: '+m.notes);});}

  // Reminders
  var activeRem=reminders.filter(function(r){return r.active;});
  if(activeRem.length){lines.push('');lines.push('ACTIVE REMINDERS ('+activeRem.length+' total)');lines.push(sep);lines.push('');activeRem.forEach(function(r){lines.push('REM: '+r.name+(r.dose?' | Dose: '+r.dose:'')+(r.count?' | Count: '+r.count:''));lines.push('  Frequency: '+(r.freq===24?'Once daily':'Every '+r.freq+'h'));if(r.endDate)lines.push('  Until: '+r.endDate);if(r.nextDate&&r.nextTime)lines.push('  Next dose: '+r.nextDate+' at '+r.nextTime);});}

  // History
  lines.push('');lines.push('HISTORY LOG ('+entries.length+' entries)');lines.push(sep);
  if(!entries.length){lines.push('');lines.push('No entries recorded.');}
  else{var sorted=entries.slice().sort(function(a,b){return sortKey(a)<sortKey(b)?-1:1;});var lastDate='';sorted.forEach(function(e){if(e.date!==lastDate){lines.push('');lines.push('--- '+e.date+' ---');lastDate=e.date;}if(e.type==='med')lines.push('['+e.time+'] MEDICATION: '+e.name+(e.dose?' '+e.dose:'')+(e.count?' | '+e.count:'')+(e.notes?' ('+e.notes+')':''));else if(e.type==='skipped')lines.push('['+e.time+'] SKIPPED: '+e.name+(e.dose?' '+e.dose:''));else if(e.type==='urine'){var p=[];if(e.amount)p.push(e.amount+' mL');if(e.color)p.push(e.color);if(e.notes)p.push(e.notes);lines.push('['+e.time+'] URINE: '+(p.join(', ')||'logged'));}else lines.push('['+e.time+'] ACTIVITY: '+e.name+(e.notes?' ('+e.notes+')':''));});}

  lines.push('');lines.push(sep);lines.push('END OF EXPORT');
  var blob=new Blob([lines.join('\n')],{type:'text/plain'});
  var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='recovery-log-'+new Date().toISOString().slice(0,10)+'.txt';a.click();
  toast('Full export downloaded');
}

function importLog(event){
  var file=event.target.files[0];if(!file)return;
  var reader=new FileReader();
  reader.onload=function(e){
    var lines=e.target.result.split('\n');
    var currentDate='';var imported=0;var skipped=0;
    var existingTs=new Set(entries.map(function(e){return e.ts;}));
    lines.forEach(function(line){
      line=line.trim();
      var dateMatch=line.match(/^---\s+(.+?)\s+---$/);
      if(dateMatch){currentDate=dateMatch[1].trim();return;}
      if(!currentDate)return;
      var timeMatch=line.match(/^\[(\d+:\d+\s*(?:AM|PM))\]\s+(MEDICATION|URINE|ACTIVITY|SKIPPED):\s*(.+)/i);
      if(!timeMatch)return;
      var time=timeMatch[1].trim();var type=timeMatch[2].toUpperCase();var rest=timeMatch[3].trim();
      var stableStr=currentDate+'|'+time+'|'+type+'|'+rest;
      var stableTs=0;for(var i=0;i<stableStr.length;i++){stableTs=((stableTs<<5)-stableTs+stableStr.charCodeAt(i))|0;}
      stableTs=Math.abs(stableTs)+3000000000;
      if(existingTs.has(stableTs)){skipped++;return;}
      var entry={date:currentDate,time:time,ts:stableTs};
      if(type==='MEDICATION'){
        entry.type='med';
        var noteMatch=rest.match(/^(.*?)\s*\(([^)]+)\)\s*$/);
        var main=noteMatch?noteMatch[1].trim():rest;
        entry.notes=noteMatch?noteMatch[2].trim():'';
        var parts=main.split('|').map(function(s){return s.trim();});
        entry.name=parts[0].replace(/\s+\d.*$/,'').trim()||parts[0];
        entry.dose='';entry.count='';
        parts.forEach(function(p){if(p.indexOf('Dose:')===0)entry.dose=p.replace('Dose:','').trim();if(p.indexOf('Count:')===0)entry.count=p.replace('Count:','').trim();});
      } else if(type==='URINE'){
        entry.type='urine';var p=rest.split(',').map(function(s){return s.trim();});
        entry.amount=parseInt(p[0])||null;entry.color=p[1]||'';entry.notes=p[2]||'';
      } else if(type==='ACTIVITY'){
        entry.type='activity';var nm=rest.match(/^(.+?)(?:\s*\((.+)\))?$/);
        entry.name=nm?nm[1].trim():rest;entry.notes=nm&&nm[2]?nm[2]:'';
      } else if(type==='SKIPPED'){
        entry.type='skipped';entry.name=rest.split(' ')[0]||rest;entry.dose=rest.split(' ').slice(1).join(' ');entry.notes='dose skipped';
      }
      entries.push(entry);existingTs.add(stableTs);imported++;
    });
    entries.sort(function(a,b){return sortKey(a)<sortKey(b)?-1:1;});
    updateCounts();saveE();event.target.value='';
    if(imported>0){toast(imported+' entries imported'+(skipped?' ('+skipped+' already existed)':''));renderHistory();}
    else toast('No new entries found'+(skipped?' — '+skipped+' already existed':''));
  };
  reader.readAsText(file);
}

function toast(msg){var t=document.createElement('div');t.textContent=msg;Object.assign(t.style,{position:'fixed',bottom:'20px',left:'50%',transform:'translateX(-50%)',background:'#1a56db',color:'#fff',padding:'10px 20px',borderRadius:'8px',fontSize:'14px',fontWeight:'600',zIndex:'999',opacity:'1',transition:'opacity 0.4s',whiteSpace:'nowrap'});document.body.appendChild(t);setTimeout(function(){t.style.opacity='0';setTimeout(function(){t.remove();},400);},1800);}
